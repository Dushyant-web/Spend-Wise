[build]
  command   = "npm run build"
  publish   = "out"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — Next.js static export generates per-route HTML files,
# but this catches any deep links that land on a missing path
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
