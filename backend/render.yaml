databases:
  - name: spendwise-db
    databaseName: spendwise
    plan: free            # upgrade to starter ($7/mo) for production

services:
  # ── FastAPI Web Server ──────────────────────────────────────────────────────
  - type: web
    name: spendwise-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free            # upgrade to starter ($7/mo) for always-on
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString  # auto-injected as asyncpg URL
      - key: REDIS_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: NVIDIA_API_KEY
        sync: false                  # you set this manually in Render dashboard
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: ALLOWED_ORIGINS
        value: '["https://your-app.netlify.app","capacitor://localhost","http://localhost"]'
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Celery Worker ───────────────────────────────────────────────────────────
  - type: worker
    name: spendwise-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: celery -A app.celery_app worker --loglevel=info --concurrency=2
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          name: spendwise-api
          type: web
          envVarKey: SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: spendwise-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: spendwise-redis
          type: redis
          property: connectionString
      - key: NVIDIA_API_KEY
        fromService:
          name: spendwise-api
          type: web
          envVarKey: NVIDIA_API_KEY

  # ── Redis ───────────────────────────────────────────────────────────────────
  - type: redis
    name: spendwise-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
