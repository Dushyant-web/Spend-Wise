name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Run CI checks first — deploy only if they pass
  # ─────────────────────────────────────────────────────────────
  ci-check:
    name: Run CI checks
    uses: ./.github/workflows/ci.yml

  # ─────────────────────────────────────────────────────────────
  # 2. Build & push backend Docker image
  # ─────────────────────────────────────────────────────────────
  build-backend:
    name: Build backend image
    needs: ci-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/spendwise-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/spendwise-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # 3. Deploy backend to Railway / Render via Docker image
  # ─────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend
    needs: build-backend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to Railway
        run: |
          curl -fsSL https://railway.app/install.sh | sh
          railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run DB migrations
        run: |
          railway run --service backend -- alembic upgrade head
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Smoke test — health check
        run: |
          sleep 15
          curl --fail https://api.spendwise.ai/health || exit 1

  # ─────────────────────────────────────────────────────────────
  # 4. Deploy frontend to Vercel
  # ─────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to Vercel
    needs: ci-check
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  # ─────────────────────────────────────────────────────────────
  # 5. Post-deploy notifications
  # ─────────────────────────────────────────────────────────────
  notify:
    name: Notify on completion
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Notify Slack — success
        if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"✅ SpendWise AI deployed successfully — commit `${{ github.sha }}` by @${{ github.actor }}"}'

      - name: Notify Slack — failure
        if: needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"text":"❌ SpendWise AI deploy FAILED — commit `${{ github.sha }}` — check Actions for details"}'
