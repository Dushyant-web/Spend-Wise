name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Backend: lint + type check + tests
  # ─────────────────────────────────────────────────────────────
  backend:
    name: Backend — lint, type check & tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: spendwise_test
          POSTGRES_PASSWORD: spendwise_test
          POSTGRES_DB: spendwise_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql+asyncpg://spendwise_test:spendwise_test@localhost:5432/spendwise_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-used-in-production
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────
  # Frontend: type check + lint + build
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type check, lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx next lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder

  # ─────────────────────────────────────────────────────────────
  # Security audit
  # ─────────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Frontend — npm audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backend — pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-48
